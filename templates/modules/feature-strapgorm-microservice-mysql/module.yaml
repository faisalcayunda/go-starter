# Manifest modul template (skema kanonik ADR-002 §3.2 / ADR-003 D2).
# Modul feature-strapgorm-microservice-mysql: pasangan driver MySQL untuk service
# product microservice (feature-strapgorm-microservice). AKTIF hanya bila
# Answers.Strapgorm ∧ access=gorm ∧ db=mysql ∧ arch=microservice (dipilih
# resolver.activeMicroserviceModules berdasar .DB).
#
# Modul MURNI gomod + compose (TANPA file .go): import driver gorm.io/driver/mysql
# ada di store.go modul SHARED (di-branch {{ if eq .DB "mysql" }}) — di sini cukup
# mendeklarasikan dependency-nya agar go.mod jujur (hanya driver terpilih) +
# menyumbang service DB MySQL & volume ke docker-compose. Pola access-gorm-<driver>.
name: feature-strapgorm-microservice-mysql
description: >-
  Pasangan driver MySQL untuk service product microservice: dependency
  gorm.io/driver/mysql + service compose MySQL (+ volume) untuk koneksi GORM
  per-service product. Tanpa file .go (driver di-import store.go modul shared).

files: []

# Dependency go.mod: driver mysql GORM (BENAR-BENAR di-import store.go modul shared
# saat db=mysql). gorm core + strapgorm SUDAH dari modul shared. Versi terverifikasi
# (pkg.go.dev): driver/mysql v1.6.0. String DIPIN (byte-identical).
gomod:
  - path:    gorm.io/driver/mysql
    version: v1.6.0

requires:
  - feature-strapgorm-microservice

# Tepat satu driver aktif: konflik dengan pasangan PostgreSQL.
conflicts:
  - feature-strapgorm-microservice-postgres

# Kontribusi merge ke docker-compose.yml root (milik arch-microservice):
#   - region:services → service MySQL (order 110 > 100 product, > service mesh);
#   - region:volumes  → volume data persisten.
contributes:
  - target:   docker-compose.yml
    anchor:   services
    fragment: fragments/compose.db.service.yml.tmpl
    order:    110
  - target:   docker-compose.yml
    anchor:   volumes
    fragment: fragments/compose.db.volume.yml.tmpl
    order:    10

vars: {}
