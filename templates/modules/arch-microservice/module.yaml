# Manifest modul template (skema kanonik ADR-002 §3.2 / ADR-003 D2).
#
# Modul arch-microservice: skeleton arsitektur MICROSERVICE monorepo single-module
# (riset 02 Kandidat B, kandidat utama). Menghasilkan N service sekaligus dalam
# SATU go.mod root: services/<name>/ (unit deploy), libs/ (kode bersama), proto/
# (kontrak per service), gen/go/ (DI-COMMIT, dihasilkan buf saat builder generate).
#
# ── KONTRAK PER-SERVICE (penting — baca sebelum mengubah) ────────────────────
# Beberapa file modul ini bersifat PER-SERVICE: ia ditulis SEKALI per service
# dalam Answers.Services. Penanda kontrak: target & when memuat placeholder
# {{ .Service }}. Resolver (Fase 4b) bertanggung jawab meng-emit set per-service
# ini sekali untuk tiap nama service, dengan DataOverride yang menambahkan:
#   .Service  string  — nama service yang sedang dirender (mis. "order")
#   .IsFirst  bool    — true HANYA untuk service pertama (pengundang inter-service)
#   .Others   []string— nama service LAIN (dipakai service pertama untuk memanggil)
# Field global (.ModulePath, .DB, .Docker, dst.) tetap diwarisi dari Data induk.
#
# File ROOT (go.mod via gomod:, Makefile, buf.yaml, buf.gen.yaml, docker-compose,
# README, .gitignore, libs/**) ditulis SEKALI tanpa placeholder service.
#
# ── INTER-SERVICE CALL (bukti T4.2) ──────────────────────────────────────────
# Tiap service = gRPC server yang mengimplementasikan rpc Ping. Service PERTAMA
# (.IsFirst) menjalankan JUGA HTTP server kecil dengan GET /call?to=<svc> yang
# mem-dial service tujuan via libs/grpcclient lalu memanggil Ping("ping") dan
# membalas JSON {"downstream": "<pesan>"} — membuktikan dua service saling
# memanggil via gRPC dalam satu `docker compose up`.
#
# ── ZERO LOCK-IN ─────────────────────────────────────────────────────────────
# Hasil generate hanya meng-import libs/ & gen/ MILIK PROJECT + google.golang.org/
# grpc & protobuf (library publik). TIDAK ada import builder. gen/*.pb.go memuat
# header "// Code generated by protoc-gen-go" — itu konvensi protobuf yang SAH
# (dikecualikan dari aturan zero-lock-in), BUKAN jejak builder.
name: arch-microservice
description: >-
  Skeleton arsitektur microservice monorepo single-module (riset 02 Kandidat B):
  N service di services/<name>/ berbagi satu go.mod root, kontrak proto/ + stub
  gen/go/ (di-commit), kode bersama di libs/ (config, logger, health, grpcclient).
  Komunikasi gRPC; contoh 2 service saling memanggil (service pertama HTTP /call →
  gRPC service kedua). buf men-generate gen/ saat builder create.

# files[] memakai skema FileSpec kanonik {template, target, mode, when}.
# Penanda PER-SERVICE = placeholder {{ .Service }} pada target/when.
files:
  # ── ROOT (sekali) ──────────────────────────────────────────────────────────
  # README microservice: jelaskan monorepo + prasyarat buf SAAT generate + add service.
  - template: README.md.tmpl
    target:   README.md
    mode:     render

  # .gitignore — JANGAN ignore gen/ (di-commit). Skeleton sendiri (bukan core)
  # karena core .gitignore digate monolith/modular; microservice OWNS .gitignore-nya.
  - template: gitignore.tmpl
    target:   .gitignore
    mode:     render

  # Konfigurasi buf (root). go_package_prefix = <ModulePath>/gen/go (managed mode).
  - template: buf.yaml.tmpl
    target:   buf.yaml
    mode:     render
  - template: buf.gen.yaml.tmpl
    target:   buf.gen.yaml
    mode:     render

  # Makefile microservice (OWNS Makefile): target proto (buf generate), build, test,
  # run-<svc> per service tak praktis di template root → run generik + compose up/down.
  - template: Makefile.tmpl
    target:   Makefile
    mode:     render

  # docker-compose.yml root: skeleton ber-anchor region:services. Tiap service
  # menyumbang satu compose-service via contributes (per-service, lihat bawah).
  # OWNS docker-compose.yml untuk microservice (core compose digate .Docker dan
  # arch monolith/modular; di sini selalu ada karena microservice butuh orkestrasi).
  - template: docker-compose.yml.tmpl
    target:   docker-compose.yml
    mode:     render

  # Dockerfile multi-service (root): service dipilih lewat build arg SERVICE.
  # Dipakai compose untuk membangun tiap service dari satu image. Memuat
  # {{ .GoVersion }} (FROM golang:<ver>) agar image build selaras go directive
  # microservice (1.25, grpc v1.81.1 butuh go ≥ 1.25) → mode: render.
  - template: Dockerfile.tmpl
    target:   Dockerfile
    mode:     render

  # ── libs/ (sekali, shared antar service) ─────────────────────────────────────
  - template: libs/config/config.go.tmpl
    target:   libs/config/config.go
    mode:     copy
  - template: libs/logger/logger.go.tmpl
    target:   libs/logger/logger.go
    mode:     copy
  - template: libs/health/health.go.tmpl
    target:   libs/health/health.go
    mode:     copy
  - template: libs/grpcclient/grpcclient.go.tmpl
    target:   libs/grpcclient/grpcclient.go
    mode:     copy

  # ── PER-SERVICE (sekali per nama service; placeholder {{ .Service }}) ─────────
  # Kontrak proto per service: paket <svc>v1, rpc Ping. DINAMIS ({{ }}) → render.
  - template: proto/service.proto.tmpl
    target:   proto/{{ .Service }}/v1/{{ .Service }}.proto
    mode:     render

  # Entrypoint service: gRPC server (+ HTTP /call untuk service pertama). DINAMIS.
  - template: services/cmd/main.go.tmpl
    target:   services/{{ .Service }}/cmd/main.go
    mode:     render

  # Konfigurasi service (env). DINAMIS ({{ .Service }} dipakai sebagai prefix env).
  - template: services/internal/config/config.go.tmpl
    target:   services/{{ .Service }}/internal/config/config.go
    mode:     render

  # Implementasi PingServer per service. DINAMIS (paket gen + nama service).
  - template: services/internal/server/server.go.tmpl
    target:   services/{{ .Service }}/internal/server/server.go
    mode:     render

  # Gateway in-proses (HTTP /call → gRPC) — HANYA untuk service pertama.
  # When per-service: aktif bila .IsFirst. DINAMIS.
  - template: services/internal/gateway/gateway.go.tmpl
    target:   services/{{ .Service }}/internal/gateway/gateway.go
    mode:     render
    when:     ".IsFirst"

# Dependency go.mod (dirakit modfile.Format, ADR-002 §6). Versi terverifikasi
# riset 02 (2026-06-06): grpc v1.81.1, protobuf v1.36.11. Stub gen/ hasil buf
# meng-import keduanya; service mengimpor gen + grpc.
gomod:
  - path:    google.golang.org/grpc
    version: v1.81.1
  - path:    google.golang.org/protobuf
    version: v1.36.11

# core menyediakan tooling-netral? TIDAK untuk microservice — modul ini self-contained
# (README/.gitignore/Makefile/compose miliknya sendiri ber-anchor). Tidak requires core
# agar tidak menarik file shared monolith/modular yang digate arch lain.
requires: []

# Tepat satu arsitektur aktif: konflik mutual dengan arch-* lain.
conflicts:
  - arch-monolith
  - arch-modular

# Kontribusi per-service ke docker-compose.yml root (anchor region:services).
# PER-SERVICE: fragment di-render sekali per service via DataOverride (.Service).
# Resolver meng-emit satu kontribusi per service ke anchor yang sama; assembler
# menyusunnya terurut (Order=10, tie-break nama service deterministik).
contributes:
  - target:   docker-compose.yml
    anchor:   services
    fragment: fragments/compose.service.yml.tmpl
    order:    10

# Vars default modul. Port gRPC dasar & HTTP gateway dipakai compose/.env/config.
vars:
  GrpcPort:    9090
  GatewayPort: 8080
