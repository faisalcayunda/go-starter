# Manifest modul template (skema kanonik ADR-002 §3.2 / ADR-003 D2).
# Modul access-gorm-mysql: lapisan akses GORM untuk MySQL. AKTIF hanya bila
# db=mysql DAN access=gorm (module-level gating di resolver). MENGGANTIKAN file
# koneksi database/sql milik db-mysql (yang di-gate `ne .Access "gorm"`) sehingga
# TEPAT SATU mekanisme akses ter-emit (tak ada double-wiring koneksi DB).
#
# Pola IDENTIK dengan access-gorm-postgres, beda hanya driver (gorm.io/driver/mysql)
# & DSN format MySQL. Dep go.mod: gorm.io/gorm + gorm.io/driver/mysql (driver mysql
# menarik go-sql-driver/mysql transitif via go mod tidy — TIDAK didaftarkan di sini
# agar go.mod jujur: hanya yang benar-benar di-import skeleton).
name: access-gorm-mysql
description: >-
  Lapisan akses GORM untuk MySQL (gorm.io/gorm + gorm.io/driver/mysql): skeleton
  koneksi dari env DSN, contoh model + AutoMigrate, dan repository GORM sederhana.
  Menggantikan koneksi database/sql db-mysql saat access=gorm; wiring
  Connect/AutoMigrate/Close ter-AUTO-WIRE ke main.

# files[] skema FileSpec kanonik {template, target, mode, when}. Tanpa `when`:
# modul ini hanya aktif saat resolver memilihnya (access=gorm ∧ db=mysql).
files:
  - template: database/gorm.go.tmpl
    target:   internal/platform/database/gorm.go
    mode:     render
  - template: database/repository.go.tmpl
    target:   internal/platform/database/repository.go
    mode:     render

# Dependency go.mod dialirkan via gomod: (dirakit modfile.Format, ADR-002 §6).
# gorm core + driver mysql — keduanya BENAR-BENAR di-import skeleton (gorm.go:
# gorm.Open + mysql.Open). Versi terverifikasi pkg.go.dev 2026-06-06:
# gorm v1.31.1 (Nov 2025), driver/mysql v1.6.0 (Jun 2025) — keduanya maintained.
gomod:
  - path:    gorm.io/gorm
    version: v1.31.1
  - path:    gorm.io/driver/mysql
    version: v1.6.0

# core menyediakan anchor region:imports + region:wiring di main. Modul ini
# menyisip ke sana (analog db-mysql).
requires:
  - core

# Mutual exclusive: akses GORM untuk driver lain.
conflicts:
  - access-gorm-postgres

# Kontribusi merge: AUTO-WIRE import paket database + wiring Connect/AutoMigrate ke
# main (anchor region:imports / region:wiring). Order 25 (> 20 db-mysql) — tak
# pernah bentrok karena koneksi database/sql db-mysql di-gate off saat access=gorm.
contributes:
  - target:   cmd/{{ modBase .ModulePath }}/main.go
    anchor:   imports
    fragment: fragments/main.imports.gorm.tmpl
    order:    25
  - target:   cmd/{{ modBase .ModulePath }}/main.go
    anchor:   wiring
    fragment: fragments/main.wiring.gorm.tmpl
    order:    25

# Vars default selaras db-mysql (DSN env). DBPort/DBName/DBUser dipakai gorm.go.
vars:
  DBPort: 3306
  DBName: app
  DBUser: app
